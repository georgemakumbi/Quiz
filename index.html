<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="intro">
        <h1>Computer Science Quiz</h1>
        <p>Welcome to the Computer Science Quiz!</p>
        <p>Please sign up to take the quiz.</p>
    </section>
    <form action="signUp.php" method="post">
        <fieldset>
            <legend>Account Information</legend>
            <label for="name">Full Name:</label>
            <input type="text" name="name" id="name" placeholder="Your full name"><br>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="Your email address"><br>
        </fieldset>
        <label for="password">Password:</label>
        <input type="password" name="password" id="password" placeholder="Your password"><br>
        <input type="submit" value="Sign Up">
    </form>
</body>
</html>
